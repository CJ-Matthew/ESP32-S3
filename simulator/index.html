<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>64×32 LED Matrix Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #aaa;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: #555;
      text-transform: uppercase;
    }

    #panel-wrap {
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
    }

    #panel { display: block; }

    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button, select {
      background: #1e1e1e;
      color: #bbb;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }
    button:hover, select:hover { background: #2a2a2a; color: #fff; }

    #fps-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #444;
      font-size: 11px;
    }

    .label { color: #555; }
    #fps-actual { color: #3a7; min-width: 2.5ch; }
    #fps-target-label { color: #666; }
    #frame { color: #444; }

    .sep { color: #333; }

    footer {
      color: #2e2e2e;
      font-size: 11px;
      text-align: center;
      line-height: 1.8;
    }
    footer code { color: #444; }
  </style>
</head>
<body>
  <h1>64 &times; 32 LED Matrix Simulator</h1>

  <div id="panel-wrap">
    <canvas id="panel"></canvas>
  </div>

  <div id="controls">
    <button id="btn-pause">Pause</button>
    <button id="btn-step" disabled>Step</button>

    <div id="fps-wrap">
      <span class="label">face</span>
      <select id="face-select"></select>

      <span class="sep">|</span>
      <span class="label">weather</span>
      <select id="weather-select">
        <option value="sunny">sunny</option>
        <option value="cloudy">cloudy</option>
        <option value="rainy">rainy</option>
      </select>

      <span class="sep">|</span>
      <span class="label">people</span>
      <select id="people-select" title="mock roster — ignored when live presence data is available">
        <option value="0">0</option>
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <span class="sep">|</span>
      <span class="label">target</span>
      <select id="fps-select">
        <option value="15">15 fps</option>
        <option value="20">20 fps</option>
        <option value="30" selected>30 fps</option>
        <option value="45">45 fps</option>
        <option value="60">60 fps</option>
        <option value="0">uncapped</option>
      </select>
      <span class="sep">|</span>
      <span class="label">actual</span>
      <span id="fps-actual">–</span>
      <span class="sep">|</span>
      <span class="label">frame</span>
      <span id="frame">0</span>
    </div>
  </div>

  <footer>
    Add a face: <code>registerFace('Name', { setup(d){}, loop(d){} })</code> in a new <code>.js</code> file, then add a <code>&lt;script&gt;</code> tag below.<br>
    <code>display.*</code> mirrors <code>dma_display-&gt;*</code> &mdash; <code>millis()</code>, <code>random()</code>, <code>sin()</code>, <code>cos()</code> available.
  </footer>

  <!-- Arduino-compatible globals -->
  <script>
    const _t0 = performance.now();
    window.millis    = () => Math.floor(performance.now() - _t0);
    window.micros    = () => Math.floor((performance.now() - _t0) * 1000);
    window.delay     = () => {};
    window.random    = (a, b) => b === undefined
      ? Math.floor(Math.random() * a)
      : Math.floor(Math.random() * (b - a)) + a;
    window.map       = (v, iL, iH, oL, oH) => oL + (v - iL) * (oH - oL) / (iH - iL);
    window.constrain = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
    window.abs       = Math.abs;
    window.min       = Math.min;
    window.max       = Math.max;
    window.sin       = (a) => Math.sin(a);
    window.cos       = (a) => Math.cos(a);
    window.sqrt      = Math.sqrt;
    window.PI        = Math.PI;

    // Face registry — face files call registerFace() to add themselves
    window._faces = [];
    window.registerFace = (name, face) => window._faces.push({ name, ...face });

    // Shared state readable by any face
    //   weatherMode: 'sunny' | 'cloudy' | 'rainy' — drives the whole face palette
    //   temperature: live °C from backend /weather, or null (→ placeholder)
    window.weatherMode = 'sunny';
    window.temperature = null;

    // House presence — one critter per person home.
    //   houseRoster: live data [{ mac_address, name, colour }] or null (→ use mock)
    //   mockPeople:  fallback count when there's no live data (file:// / offline)
    window.houseRoster = null;
    window.mockPeople  = 1;
</script>

  <script src="matrix.js"></script>

  <!-- ── Face files — add a <script> tag here for each new face ── -->
  <script src="sketch.js"></script>
  <script src="face_clock_a.js"></script>

  <script>
    const display = new MatrixDisplay('panel');

    // Populate face selector
    const faceSelect = document.getElementById('face-select');
    window._faces.forEach((f, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = f.name;
      faceSelect.appendChild(opt);
    });

    // Weather selector
    const weatherSelect = document.getElementById('weather-select');
    weatherSelect.addEventListener('change', () => {
      window.weatherMode = weatherSelect.value;
    });

    // People (mock roster) selector — only used when there's no live data
    const peopleSelect = document.getElementById('people-select');
    peopleSelect.addEventListener('change', () => {
      window.mockPeople = parseInt(peopleSelect.value, 10);
    });

    // Live roster poll (every 10s). Fetches a SAME-ORIGIN /connected, so it works
    // when the sim is served behind the dev proxy (which injects the API key and
    // forwards to the backend). On file:// it's skipped and the mock count is used.
    async function pollRoster() {
      if (!location.protocol.startsWith('http')) return;   // file:// → mock only
      try {
        const res = await fetch('./connected', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        window.houseRoster = Array.isArray(data.connected_devices)
          ? data.connected_devices : null;
      } catch (_) { /* proxy down / offline — keep last-known or mock */ }
    }
    pollRoster();
    setInterval(pollRoster, 10000);

    // Live weather poll (every 60s). Same-origin /weather via the dev proxy sets the
    // condition (which drives the whole palette) and the temperature. On file:// it's
    // skipped, so the weather dropdown drives the palette and the temp shows a placeholder.
    async function pollWeather() {
      if (!location.protocol.startsWith('http')) return;
      try {
        const res = await fetch('./weather', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        if (['sunny', 'cloudy', 'rainy'].includes(data.condition)) {
          window.weatherMode = data.condition;
          weatherSelect.value = data.condition;         // reflect live value in the dropdown
        }
        const temp = Number(data.temperature);
        if (Number.isFinite(temp)) window.temperature = temp;
      } catch (_) { /* proxy down / offline — keep dropdown + placeholder */ }
    }
    pollWeather();
    setInterval(pollWeather, 60000);

    // Active face
    let activeFace = window._faces[0];
    if (activeFace?.setup) activeFace.setup(display);
    display.render();

    faceSelect.addEventListener('change', () => {
      activeFace = window._faces[parseInt(faceSelect.value)];
      display.clearScreen();
      display.render();
      if (activeFace?.setup) activeFace.setup(display);
      frameCount = 0;
      measuredFrames = 0;
      measuredStart = performance.now();
    });

    // ── Loop ──────────────────────────────────────────────────────────────────
    let paused        = false;
    let frameCount    = 0;
    let targetFPS     = 30;
    let frameInterval = 1000 / targetFPS;
    let lastFrameTime = 0;

    let measuredFrames = 0;
    let measuredStart  = performance.now();

    const fpsEl    = document.getElementById('fps-actual');
    const frameEl  = document.getElementById('frame');
    const btnPause = document.getElementById('btn-pause');
    const btnStep  = document.getElementById('btn-step');
    const fpsSelect = document.getElementById('fps-select');

    fpsSelect.addEventListener('change', () => {
      targetFPS = parseInt(fpsSelect.value, 10);
      frameInterval = targetFPS === 0 ? 0 : 1000 / targetFPS;
    });

    btnPause.addEventListener('click', () => {
      paused = !paused;
      btnPause.textContent = paused ? 'Resume' : 'Pause';
      btnStep.disabled = !paused;
      if (!paused) {
        measuredStart = performance.now();
        measuredFrames = 0;
        requestAnimationFrame(tick);
      }
    });

    btnStep.addEventListener('click', () => {
      if (!paused) return;
      runFrame();
      display.render();
      frameEl.textContent = frameCount;
    });

    function runFrame() {
      if (activeFace?.loop) activeFace.loop(display);
      frameCount++;
    }

    function tick(now) {
      if (paused) return;

      const elapsed = now - lastFrameTime;

      if (elapsed >= frameInterval) {
        lastFrameTime = frameInterval > 0 ? now - (elapsed % frameInterval) : now;

        runFrame();
        display.render();
        frameEl.textContent = frameCount;

        measuredFrames++;
        const measureElapsed = now - measuredStart;
        if (measureElapsed >= 500) {
          fpsEl.textContent = Math.round(measuredFrames * 1000 / measureElapsed);
          measuredFrames = 0;
          measuredStart  = now;
        }
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
